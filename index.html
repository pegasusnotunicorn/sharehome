    <style>
      :root {
        --hero-static-banner-height: 38px;
        --hero-static-banner-height-mobile: 45px;
        --hero-static-banner-navbar-spacing: 0px;
        --hero-static-navbar-height: 82px;
      }

      body {
        overflow-y: scroll;
      }
      html,
      body {
        margin: 0;
      }
      #hero-static {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100svh;
        position: relative;
        margin-top: var(--hero-static-banner-height);
        box-sizing: border-box;
      }

      .heroImageStatic {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100%;
        max-width: 1000px;
        max-height: calc(100svh - 10rem);
        height: auto;
        object-fit: contain;
        display: block;
      }

      @media only screen and (min-width: 901px) {
        .heroImageStatic {
          width: min(88vw, 1000px, calc((100svh - 13rem) * 1.45));
          max-height: calc(100svh - 13rem);
        }
      }

      @media only screen and (max-width: 900px) {
        #hero-static {
          padding-top: calc(
            var(--hero-static-banner-height-mobile) +
              var(--hero-static-navbar-height) - 1.5rem
          );
          margin-top: calc(
            -1 * (
                var(--hero-static-banner-height-mobile) +
                  var(--hero-static-banner-navbar-spacing) +
                  var(--hero-static-navbar-height) +
                  var(--hero-static-banner-navbar-spacing)
              )
          );
        }
      }

      .bgTexture {
        height: 100%;
        width: 100%;
        position: absolute;
        z-index: -1;
        opacity: 0.1;
        background-color: rgba(244, 236, 194);
      }

      .bgTexture.with-texture {
        opacity: 0.15;
        background: url("images/bg_texture.webp");
        background-repeat: repeat;
        background-size: 500px;
      }
    </style>
